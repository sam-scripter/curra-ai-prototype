version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: curra_db
    environment:
      POSTGRES_DB: curra_db
      POSTGRES_USER: curra_user
      POSTGRES_PASSWORD: curra_pass
    ports:
      - "5433:5432"
    volumes:
      - curra_pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curra_user -d curra_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: curra_redis
    ports:
      # 6380 externally to avoid clashing with any local Redis instance.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: curra_backend
    env_file: .env
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./knowledge:/app/knowledge
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  curra_pgdata: